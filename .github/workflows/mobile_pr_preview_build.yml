# ABOUTME: Builds a Flutter web preview artifact for every divine-mobile pull request
# ABOUTME: Uploads a deployable artifact that a trusted workflow later pushes to Cloudflare Pages with Wrangler

name: Mobile PR Preview Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "mobile/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: Build Flutter Web Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web preview
        run: |
          flutter build web \
            --release \
            --tree-shake-icons \
            --optimization-level=4 \
            --pwa-strategy=none \
            --dart-define=BACKEND_URL=https://api.openvine.co \
            --dart-define=ENVIRONMENT=production \
            --no-source-maps

      - name: Bundle preview artifact
        run: |
          tar -C build -czf pr-web-preview-site.tar.gz web
          cat > pr-web-preview-metadata.json <<EOF
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "head_ref": "${{ github.event.pull_request.head.ref }}",
            "head_sha": "${{ github.event.pull_request.head.sha }}"
          }
          EOF

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pr-preview
          path: |
            mobile/pr-web-preview-site.tar.gz
            mobile/pr-web-preview-metadata.json
          if-no-files-found: error
          retention-days: 7
